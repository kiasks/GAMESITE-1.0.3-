<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FNF ZONE | SELECCIÓN COMPLETA</title>
    <style>
        :root {
            --fnf-cyan: #00ffff;
            --fnf-magenta: #ff00ff;
            --bg: #050505;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
        }

        header {
            padding: 20px; background: #000; border-bottom: 3px solid var(--fnf-magenta);
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        /* --- BOTÓN QUE TE MANTIENE EN FNF ZONE --- */
        .back-to-zone {
            display: inline-block;
            margin-top: 10px;
            color: #fff;
            text-decoration: none;
            border: 2px solid var(--fnf-cyan);
            padding: 10px 25px;
            background: #000;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .back-to-zone:hover {
            background: var(--fnf-cyan);
            box-shadow: 0 0 15px var(--fnf-cyan);
            color: black;
        }

        .mods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 40px;
        }

        /* --- ESTILO DE LAS CARTAS --- */
        .card {
            height: 350px;
            background-color: #111;
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 40%, rgba(0,0,0,0.9));
            z-index: 1;
        }

        .card:hover {
            border-color: var(--fnf-cyan);
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--fnf-cyan);
            z-index: 10;
        }

        .card-info {
            position: relative;
            z-index: 2;
            padding: 20px;
            text-align: center;
        }

        .card-info h3 { margin: 0; font-size: 20px; color: #fff; text-shadow: 2px 2px #000; }
        .card-info p { margin: 5px 0 0; font-size: 12px; color: var(--fnf-cyan); font-weight: bold; }
    </style>
</head>

<script>
    // Función para no salir de tu zona
    function irAFnfZone() {
        window.location.href = 'index.html'; 
    }

    // El truco del botón ESC para tu Lenovo
