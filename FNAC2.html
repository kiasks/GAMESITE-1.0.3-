<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:title" content="Five Nights at Candy's 2">
    <meta property="og:image" content="https://kiasks.github.io/GAMESITE-V1-/pagesprites/fnac2portada.webp">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaC 2 | Local Host</title>
    <link rel="stylesheet" type="text/css" href="pagesprites/style.css"/>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        #progress-container { position: absolute; bottom: 20px; width: 300px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="MMFCanvas" width="1280" height="720"></canvas>
    </div>

    <div id="progress-container">
        <div id="download-text">Cargando datos... 0%</div>
        <div style="width: 100%; background: #333; height: 10px; border-radius: 5px; margin-top: 5px;">
            <div id="download-bar" style="width: 0%; height: 100%; background: #3b82f6; border-radius: 5px;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // 🚨 AQUÍ ESTÁ EL TRUCO: Le decimos que use JSDELIVR solo para los datos pesados
        // Pero el motor corre desde tu GitHub.
        window.location.origin_fake = "https://cdn.jsdelivr.net/gh/web-ports/fnac/2/";

        // Forzar audio y cámaras al hacer clic
        window.addEventListener('mousedown', () => {
            if (typeof crunApp !== 'undefined' && crunApp.resume) crunApp.resume();
        });
    </script>

    <script src="pagesprites/main.js"></script>
</body>
</html>
