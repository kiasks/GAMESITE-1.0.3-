    <script>
        // Evitar que las flechas muevan la página en el navegador
        window.addEventListener("keydown", function(e) {
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault(); 
            }
        }, false);
    </script>
    
    <style>

            margin: 0; 
            padding: 0; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
        }
        #openfl-content { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div id="openfl-content"></div>
    
    <script type="text/javascript">
        // Inicio del motor PsychEngine sin basura de rastreo
        lime.embed("PsychEngine", "openfl-content", 1280, 720, { parameters: {} });
