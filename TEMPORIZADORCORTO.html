<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWGAME - Próximamente</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0050E6, #002060); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        #countdown {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
        }

        .number {
            display: block;
            font-size: 3rem;
            font-weight: bold;
            color: #25D366; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DESBLOQUEO EN MEDIA HORA</h1>
        <p>¡De mientras puedes probar los demás juegos!</p>
        
        <div id="countdown">
            <div class="time-box">
                <span class="number" id="minutes">00</span> min
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span> seg
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: Hoy a las 5:45 PM (17:45)
        const targetDate = new Date();
        targetDate.setHours(17, 45, 0, 0); 

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate.getTime() - now;

            // CUANDO SE ACABA EL TIEMPO
            if (diff <= 0) {
                clearInterval(timer);
                document.querySelector(".container").innerHTML = "<h1>¡ABRIENDO FRUIT NINJA!</h1>";
                
                // Redirigir a tu archivo local de EmuOS
                window.location.href = "FRUITNINJAORIGINAL.html"; 
                return;
            }

            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
            
        }, 1000);
    </script>
</body>
</html>
