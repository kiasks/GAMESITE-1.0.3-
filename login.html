<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS GALLERY - Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #111214;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Título Principal estilo GS GALLERY */
        .gallery-logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            color: #ff0000;
            text-transform: uppercase;
        }

        .gallery-logo span {
            color: #ffffff;
        }

        /* Caja de Login */
        .login-box {
            background-color: #202225;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 8px;
            border: 1px solid #2f3136;
            box-shadow: 0 6px 16px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Estilo de los textos que me pediste */
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #b9bbbe;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #2f3136;
            border: 1px solid #202225;
            border-radius: 4px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #ff0000;
        }

        /* Botón de Entrar */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #ff0000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-submit:hover {
            background-color: #cc0000;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 13px;
            color: #b9bbbe;
            text-align: center;
        }

        .login-footer a {
            color: #00a2ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="gallery-logo">GS <span>GALLERY  [BETA]</span></div>

    <div class="login-box">
        <h2>Ingresa a tu cuenta</h2>
        
        <form id="gallery-auth-form" action="catalogo.html" method="GET">
            
            <div class="form-group">
                <label for="username">Nombre de usuario:</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            
            <div class="form-group">
                <label for="email">Gmail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            ¿No tienes cuenta? <a href="#" onclick="alert('¡Coloca los datos que quieras para probar localmente!')">Regístrate aquí</a>
        </div>
    </div>

    <script>
        document.getElementById('gallery-auth-form').addEventListener('submit', function() {
            const user = document.getElementById('username').value.trim();
            // Guardamos el nombre del usuario para pasarlo al catálogo
            localStorage.setItem('usuarioLogueado', user);
        });
    </script>

</body>
</html>
