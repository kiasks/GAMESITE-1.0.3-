<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GAME SITE (UPTADE)</title>
    <link rel="icon" type="image/png" href="pagesprites/FAVICON.png">
    <style>
        :root {
            --neon-green: #0f0;
            --fnf-pink: #ff00ff;
            --sidebar-bg: rgba(10, 10, 10, 0.95);
        }

        body { 
            margin: 0; background: #050505; color: #fff; 
            font-family: 'Courier New', monospace; display: flex; min-height: 100vh;
        }

        /* --- SIDEBAR IZQUIERDA --- */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 60px; height: 100vh;
            background: var(--sidebar-bg); border-right: 2px solid #222;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; z-index: 200; transition: 0.3s; overflow: hidden;
        }

        .sidebar:hover { width: 220px; border-right-color: var(--neon-green); }

        .side-btn {
            width: 45px; height: 45px; margin-bottom: 20px;
            background: #1a1a1a; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid #333; transition: 0.2s;
        }

        .side-btn:hover { border-color: var(--neon-green); transform: scale(1.1); }
        .side-label { display: none; color: #fff; margin-left: 15px; font-size: 14px; white-space: nowrap; }
        .sidebar:hover .side-label { display: block; }

        /* --- CONTENEDOR DE JUEGOS --- */
        .main-container {
            margin-left: 60px; width: calc(100% - 60px);
            display: flex; flex-direction: column; align-items: center; padding: 40px;
        }

        .menu-logo { max-width: 280px; filter: drop-shadow(0 0 15px var(--neon-green)); }

        .menu-container {
            display: flex; gap: 25px; flex-wrap: wrap; justify-content: center;
            max-width: 1300px; margin-top: 30px;
        }

        /* --- CARDS (ESTILO ARCADE SELECTION) --- */
        .game-card {
            width: 210px; height: 300px; background: #111;
            border: 4px solid #333; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            cursor: pointer; transition: 0.4s; position: relative; overflow: hidden;
            background-size: cover; background-position: center;
        }

        .game-card:hover { transform: translateY(-10px); border-color: var(--color); box-shadow: 0 0 25px var(--color); }

        .game-name { 
            font-size: 14px; font-weight: bold; text-align: center; width: 100%;
            background: rgba(0,0,0,0.8); padding: 8px 0; z-index: 2;
        }

        /* --- TUS PORTADAS --- */
        .fnf-card { --color: #ff00ff; background-image: url('pagesprites/fnfportada.jpg'); }
        .snake-card { --color: #0f0; background-image: url('pagesprites/snakeportada.png'); }
        .fruit-card { --color: #ffcc00; background-image: url('pagesprites/fruitninjaportada.png'); }
        .death-card { --color: #f00; background-image: url('pagesprites/deathcase1.png'); }
        .granny-card { --color: #888; background-image: url('pagesprites/grannyportada.jpg'); }
        .granny2-card { --color: #0088ff; background-image: url('pagesprites/granny2portada.jpg'); }
        .hollow-card { --color: #fff; background-image: url('pagesprites/hollowknightportada2.jpg'); }
        .fnaf3-card { --color: #55ff55; background-image: url('pagesprites/fnaf3portada.webp'); }
        .baldi-card { --color: #0f0; background-image: url('pagesprites/baldiRportada.jpg'); }
        .solar-card { --color: #ff4400; background-image: url('pagesprites/solarsmashportada.jpg'); }
        .jetpack-card { --color: #ffee00; background-image: url('pagesprites/jetpackjoyrideportada.jpg'); }
        .physics-card { --color: #0088ff; background-image: url('GAMESSPRITES/LOGOHTMLPHYSICS.png'); }

        /* --- FRAME DE JUEGO --- */
        #game-frame-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 300;
        }
        #back-btn {
            position: absolute; top: 20px; left: 80px; padding: 10px 20px;
            background: #222; color: #fff; border: 2px solid var(--neon-green); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn" onclick="location.reload()">🏠<span class="side-label">INICIO</span></div>
        <!-- Este ahora redirigirá a tu nuevo sitio separado -->
        <div class="side-btn" onclick="location.href='fnfzone.html'" style="border-color: var(--fnf-pink);">🎤<span class="side-label">FNF ZONE</span></div>
    </div>

    <div class="main-container">
        <img src="pagesprites/newlogo.png" class="menu-logo">
        <h1 style="color:#0f0; text-shadow: 0 0 10px #0f0;">ARCADE SELECTION</h1>

        <div class="menu-container">
            <div class="game-card fnf-card" onclick="location.href='fnfzone.html'"><div class="game-name">FNF ZONE (ENTRAR)</div></div>
            <div class="game-card snake-card" onclick="openGame('snake.html')"><div class="game-name">SNAKE 3D</div></div>
            <div class="game-card fruit-card" onclick="openGame('FRUITNINJA!!.html')"><div class="game-name">FRUIT NINJA</div></div>
            <div class="game-card granny-card" onclick="openGame('grannyinfinite.html')"><div class="game-name">GRANNY ORIGINAL</div></div>
            <div class="game-card granny2-card" onclick="openGame('GRANNY2.html')"><div class="game-name">GRANNY 2</div></div>
            <div class="game-card fnaf3-card" onclick="openGame('FNAF3.html')"><div class="game-name">FNAF 3</div></div>
            <div class="game-card baldi-card" onclick="openGame('BALDIREMASTERED.html')"><div class="game-name">BALDI REMASTERED</div></div>
            <div class="game-card hollow-card" onclick="openGame('HOLLOWKINIGTH.html')"><div class="game-name">HOLLOW KNIGHT</div></div>
            <div class="game-card solar-card" onclick="openGame('SOLARSMASH.html')"><div class="game-name">SOLAR SMASH</div></div>
            <div class="game-card jetpack-card" onclick="openGame('JETPACKJOYRIDE.html')"><div class="game-name">JETPACK JOYRIDE</div></div>
            <div class="game-card physics-card" onclick="openGame('HTMLphysics.html')"><div class="game-name">HTML PHYSICS 3D</div></div>
            <div class="game-card death-card" onclick="openGame('DEATHCASE1.html')"><div class="game-name">DEATH CASE (DEMO)</div></div>
        </div>
    </div>

    <div id="game-frame-container">
        <button id="back-btn" onclick="closeGame()">ESC - VOLVER</button>
        <iframe id="game-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        function openGame(file) {
            document.getElementById('game-frame').src = file;
            document.getElementById('game-frame-container').style.display = 'block';
        }
        function closeGame() {
            document.getElementById('game-frame').src = "";
            document.getElementById('game-frame-container').style.display = 'none';
        }
    </script>
</body>
</html>
